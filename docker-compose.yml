services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      PORT: 3000
    ports:
      - "127.0.0.1:${MCP_APP_HOST_PORT:-3008}:3000"
    volumes:
      - mcp-data:/app/data
    networks:
      - apps-net

  bill:
    build: .
    restart: unless-stopped
    command: ["bun", "run", "src/bill/index.ts"]
    env_file:
      - .env.production
    environment:
      BILL_PORT: 3009
    ports:
      - "127.0.0.1:${BILL_APP_HOST_PORT:-3009}:3009"
    networks:
      - apps-net

volumes:
  mcp-data:

networks:
  apps-net:
    external: true
