name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: bill-production
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEPLOY_DIR: /home/exedev/apps/bill

jobs:
  deploy:
    name: Deploy to exe.dev VM
    runs-on: [self-hosted, linux, bill-prod]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Write production env file
        run: |
          cat > .env.production <<EOF
          YNAB_ACCESS_TOKEN=${{ secrets.YNAB_ACCESS_TOKEN }}
          MCP_BEARER_TOKEN=${{ secrets.MCP_BEARER_TOKEN }}
          OAUTH_LOGIN_PASSWORD=${{ secrets.OAUTH_LOGIN_PASSWORD }}
          OAUTH_SESSION_SECRET=${{ secrets.OAUTH_SESSION_SECRET }}
          PUBLIC_BASE_URL=https://bill.vhtm.eu
          OAUTH_LOGIN_USERNAME=json
          MCP_APP_HOST_PORT=3008
          COMPOSE_PROJECT_NAME=bill
          BILL_APP_HOST_PORT=3009
          BILL_BUDGET_ID=73e2b89c-05df-4a93-b0dd-95d9a9bf6bc2
          BILL_JOINT_GROUP_ID=de79d1b8-2b99-406c-8422-2d59cdca9d3c
          BILL_JOINT_ACCOUNT_ID=13c7e3c0-0abf-4198-ab4f-b038bf7a8864
          EOF

      - name: Copy checkout to stable deploy directory
        run: |
          rm -rf "$DEPLOY_DIR.tmp"
          mkdir -p "$DEPLOY_DIR.tmp"
          cp -a . "$DEPLOY_DIR.tmp/"
          rm -rf "$DEPLOY_DIR"
          mv "$DEPLOY_DIR.tmp" "$DEPLOY_DIR"

      - name: Deploy with Docker Compose
        run: |
          cd "$DEPLOY_DIR"
          docker compose --env-file .env.production up -d --build --remove-orphans
          docker compose --env-file .env.production ps

      - name: Reload Caddy (picks up deploy/caddy.snippet)
        run: |
          sudo /usr/bin/caddy validate --config /etc/caddy/Caddyfile
          sudo /usr/bin/systemctl reload caddy
